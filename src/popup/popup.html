<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Portals</title>
  <link rel="stylesheet" href="popup.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <div id="app">
    <!-- ═══════════════════════════════════════════ -->
    <!-- MAIN VIEW                                   -->
    <!-- ═══════════════════════════════════════════ -->
    <div id="main-view" class="view active">

      <!-- Top bar -->
      <div class="topbar">
        <div class="topbar-left">
          <div class="logo-mark">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path d="M12 2L2 7l10 5 10-5-10-5z" fill="url(#grd1)"/>
              <path d="M2 17l10 5 10-5" stroke="url(#grd2)" stroke-width="2" fill="none"/>
              <path d="M2 12l10 5 10-5" stroke="url(#grd2)" stroke-width="2" fill="none"/>
              <defs>
                <linearGradient id="grd1" x1="2" y1="2" x2="22" y2="12">
                  <stop stop-color="#818cf8"/><stop offset="1" stop-color="#6366f1"/>
                </linearGradient>
                <linearGradient id="grd2" x1="2" y1="12" x2="22" y2="22">
                  <stop stop-color="#818cf8"/><stop offset="1" stop-color="#a78bfa"/>
                </linearGradient>
              </defs>
            </svg>
          </div>
          <span class="topbar-title">Portals</span>
        </div>
        <button id="btn-settings" class="topbar-action" title="Settings (S)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>

      <!-- Profile selector (custom dropdown) -->
      <div class="field-group">
        <label class="field-label">Profile</label>
        <div class="custom-select" id="profile-dropdown">
          <button class="custom-select-trigger" id="profile-trigger">
            <span class="custom-select-value" id="profile-value">Select profile</span>
            <svg class="custom-select-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div class="custom-select-options" id="profile-options"></div>
        </div>
      </div>

      <!-- Environment cards -->
      <div class="section-label">Switch to</div>
      <div class="env-list" id="env-list">
        <!-- rendered by JS -->
      </div>

      <!-- Footer -->
      <div class="footer">
        <label class="toggle" id="toggle-sidebyside">
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
          <span class="toggle-text">Open side-by-side</span>
        </label>
        <label class="toggle" id="toggle-newtab">
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
          <span class="toggle-text">Open in new tab</span>
        </label>
      </div>

      <div class="legal-footer">
        <div class="legal-links">
          <button class="legal-link" data-doc="terms">Terms of Service</button>
          <span class="legal-separator">|</span>
          <button class="legal-link" data-doc="privacy">Privacy Terms</button>
        </div>
        <div class="legal-copy">Copyright © 2026 Portals. All rights reserved.</div>
      </div>
    </div>

    <!-- ═══════════════════════════════════════════ -->
    <!-- SETTINGS VIEW                               -->
    <!-- ═══════════════════════════════════════════ -->
    <div id="settings-view" class="view">

      <div class="topbar">
        <div class="topbar-left">
          <button id="btn-back" class="topbar-action" title="Back (Esc)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          </button>
          <span class="topbar-title">Settings</span>
        </div>
        <button id="btn-add-profile" class="btn-primary-sm" title="Add Profile (N)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          <span>New Profile</span>
        </button>
      </div>

      <div class="profiles-list" id="profiles-editor">
        <!-- rendered by JS -->
      </div>

      <div class="legal-footer legal-footer-settings">
        <div class="legal-links">
          <button class="legal-link" data-doc="terms">Terms of Service</button>
          <span class="legal-separator">|</span>
          <button class="legal-link" data-doc="privacy">Privacy Terms</button>
        </div>
        <div class="legal-copy">Copyright © 2026 Portals. All rights reserved.</div>
      </div>

    </div>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
